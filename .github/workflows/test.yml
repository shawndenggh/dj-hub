name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Jest tests with coverage
        run: npm test -- --coverage --ci --passWithNoTests
        env:
          CI: true
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: file:./test.db
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit
          name: jest-coverage
          fail_ci_if_error: false

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-and-integration
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup test database
        run: |
          cp .env.example .env.local
          echo "DATABASE_URL=file:./e2e-test.db" >> .env.local
          echo "NEXTAUTH_SECRET=e2e-test-secret" >> .env.local
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env.local
          echo "GITHUB_CLIENT_ID=e2e-placeholder" >> .env.local
          echo "GITHUB_CLIENT_SECRET=e2e-placeholder" >> .env.local
          echo "STRIPE_SECRET_KEY=sk_test_placeholder" >> .env.local
          echo "STRIPE_WEBHOOK_SECRET=whsec_placeholder" >> .env.local
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env.local

      - name: Generate Prisma client & push schema
        run: |
          npx prisma generate
          npx prisma db push

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  coverage-check:
    name: Coverage Gate (≥ 95%)
    runs-on: ubuntu-latest
    needs: unit-and-integration
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Check coverage thresholds
        run: npm test -- --coverage --ci --coverageThreshold='{"global":{"statements":95,"branches":95,"functions":95,"lines":95}}'
        env:
          CI: true
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: file:./test.db
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
